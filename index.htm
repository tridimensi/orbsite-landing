<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbsite Hero</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --black: #000000;
      --gray: #5f5f5f;
      --container: 1200px;
      --side-padding: 80px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: "Inter", sans-serif;
      background: #fff;
      color: var(--black);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .hero-page {
      position: relative;
      min-height: 100vh;
      overflow: hidden;
      isolation: isolate;
    }

    .hero-bg {
      position: absolute;
      inset: 0;
      z-index: -2;
      overflow: hidden;
      background: #eeeeee;
    }

    .hero-bg video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .hero-bg::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(
        90deg,
        rgba(238, 238, 238, 0.96) 0%,
        rgba(238, 238, 238, 0.88) 34%,
        rgba(238, 238, 238, 0.44) 62%,
        rgba(238, 238, 238, 0.08) 100%
      );
      pointer-events: none;
    }

    .container {
      width: min(100%, var(--container));
      margin: 0 auto;
      padding: 0 var(--side-padding);
    }

    .navbar {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 32px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .brand svg {
      width: 32px;
      height: 32px;
      display: block;
    }

    .brand-text {
      font-size: 32px;
      line-height: 40px;
      font-weight: 500;
      letter-spacing: -1px;
      color: #000;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 32px;
      list-style: none;
      margin-left: auto;
      margin-right: auto;
    }

    .nav-links a {
      font-size: 15px;
      line-height: 20px;
      font-weight: 400;
      letter-spacing: 0;
      color: #000;
      transition: color 0.2s ease;
    }

    .nav-links a:hover,
    .sign-in:hover {
      color: #5f5f5f;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }

    .sign-in {
      font-size: 15px;
      line-height: 20px;
      font-weight: 600;
      letter-spacing: 0;
      color: #000;
      transition: color 0.2s ease;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 8px 16px;
      background: #000;
      color: #fff;
      border: 0;
      border-radius: 0;
      font-family: inherit;
      font-size: 15px;
      line-height: 20px;
      font-weight: 400;
      letter-spacing: 0;
      cursor: pointer;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .btn:hover {
      opacity: 0.86;
      transform: translateY(-1px);
    }

    .hero-content {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
      padding-bottom: 88px;
    }

    .hero-copy {
      width: 100%;
      max-width: 720px;
    }

    .hero-title {
      font-size: 94px;
      line-height: 100px;
      font-weight: 400;
      letter-spacing: 0;
      color: #000;
    }

    .hero-subtitle {
      margin-top: 32px;
      font-size: 22px;
      line-height: 32px;
      font-weight: 400;
      letter-spacing: 0;
      color: var(--gray);
      max-width: 720px;
    }

    .hero-cta {
      margin-top: 32px;
    }

    .mobile-menu-btn {
      display: none;
      width: 40px;
      height: 40px;
      border: 0;
      background: transparent;
      cursor: pointer;
      position: relative;
      z-index: 20;
    }

    .mobile-menu-btn span {
      display: block;
      width: 24px;
      height: 2px;
      background: #000;
      margin: 5px auto;
      transition: transform 0.25s ease, opacity 0.2s ease;
    }

    .mobile-menu-btn.is-open span:nth-child(1) {
      transform: translateY(3.5px) rotate(45deg);
    }

    .mobile-menu-btn.is-open span:nth-child(2) {
      transform: translateY(-3.5px) rotate(-45deg);
    }

    .mobile-panel {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 28px;
      background: rgba(238, 238, 238, 0.96);
      opacity: 0;
      visibility: hidden;
      transform: translateY(-12px);
      transition: opacity 0.25s ease, visibility 0.25s ease, transform 0.25s ease;
    }

    .mobile-panel.is-open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    .mobile-panel a {
      font-size: 32px;
      line-height: 40px;
      font-weight: 400;
      color: #000;
      transition: color 0.2s ease;
    }

    .mobile-panel a:hover {
      color: #5f5f5f;
    }

    .mobile-panel .mobile-sign-in {
      font-size: 18px;
      line-height: 24px;
      font-weight: 600;
      margin-top: 12px;
    }

    .mobile-panel .btn {
      font-size: 15px;
      line-height: 20px;
      color: #fff;
    }

    body.menu-open {
      overflow: hidden;
    }

    @media (max-width: 1024px) {
      :root {
        --side-padding: 48px;
      }

      .hero-title {
        font-size: 72px;
        line-height: 78px;
      }

      .hero-subtitle {
        max-width: 600px;
        font-size: 20px;
        line-height: 30px;
      }

      .hero-bg::after {
        background: linear-gradient(
          90deg,
          rgba(238, 238, 238, 0.96) 0%,
          rgba(238, 238, 238, 0.82) 46%,
          rgba(238, 238, 238, 0.24) 100%
        );
      }
    }

    @media (max-width: 860px) {
      .nav-links,
      .nav-actions {
        display: none;
      }

      .mobile-menu-btn {
        display: block;
      }

      .navbar {
        height: 72px;
      }

      .brand svg {
        width: 30px;
        height: 30px;
      }

      .brand-text {
        font-size: 28px;
        line-height: 36px;
      }

      .hero-content {
        min-height: calc(100vh - 72px);
        align-items: flex-end;
        padding-bottom: 88px;
      }

      .hero-copy {
        max-width: 620px;
      }

      .hero-title {
        font-size: 58px;
        line-height: 64px;
      }
    }

    @media (max-width: 560px) {
      :root {
        --side-padding: 24px;
      }

      .navbar {
        height: 68px;
      }

      .brand {
        gap: 6px;
      }

      .brand svg {
        width: 28px;
        height: 28px;
      }

      .brand-text {
        font-size: 24px;
        line-height: 32px;
        letter-spacing: -0.8px;
      }

      .hero-bg video {
        object-position: 64% center;
      }

      .hero-bg::after {
        background: linear-gradient(
          180deg,
          rgba(238, 238, 238, 0.66) 0%,
          rgba(238, 238, 238, 0.88) 52%,
          rgba(238, 238, 238, 0.98) 100%
        );
      }

      .hero-content {
        min-height: calc(100vh - 68px);
        align-items: flex-end;
        padding-bottom: 56px;
      }

      .hero-title {
        font-size: 46px;
        line-height: 52px;
      }

      .hero-subtitle {
        margin-top: 24px;
        font-size: 18px;
        line-height: 28px;
      }

      .hero-cta {
        margin-top: 28px;
      }
    }
  </style>
</head>
<body>
  <section class="hero-page">
   <div class="hero-bg" aria-hidden="true">
      <video autoplay muted loop playsinline>
        <source src="./assets/11.webm" type="video/webm" />
      </video>
  </div>

    <header class="container">
      <nav class="navbar" aria-label="Main navigation">
        <a href="#" class="brand" aria-label="Orbsite home">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M0 0H14C14 7.732 7.732 14 0 14V0Z" fill="black"/>
            <path d="M18 0H32V14C24.268 14 18 7.732 18 0Z" fill="black"/>
            <path d="M0 18C7.732 18 14 24.268 14 32H0V18Z" fill="black"/>
            <path d="M32 18V32H18C18 24.268 24.268 18 32 18Z" fill="black"/>
          </svg>
          <span class="brand-text">Orbsite</span>
        </a>

        <ul class="nav-links">
          <li><a href="#features">Features</a></li>
          <li><a href="#showcase">Showcase</a></li>
          <li><a href="#pricing">Pricing</a></li>
          <li><a href="#blog">Blog</a></li>
          <li><a href="#company">Company</a></li>
        </ul>

        <div class="nav-actions">
          <a href="#signin" class="sign-in">Sign In</a>
          <a href="#start" class="btn">Get Started</a>
        </div>

        <button class="mobile-menu-btn" type="button" aria-label="Open menu" aria-expanded="false" aria-controls="mobile-panel">
          <span></span>
          <span></span>
        </button>
      </nav>
    </header>

    <div class="mobile-panel" id="mobile-panel" aria-hidden="true">
      <a href="#features">Features</a>
      <a href="#showcase">Showcase</a>
      <a href="#pricing">Pricing</a>
      <a href="#blog">Blog</a>
      <a href="#company">Company</a>
      <a href="#signin" class="mobile-sign-in">Sign In</a>
      <a href="#start" class="btn">Get Started</a>
    </div>

    <main class="container hero-content">
      <div class="hero-copy">
        <h1 class="hero-title">Move Ideas<br />Into Motion</h1>
        <p class="hero-subtitle">A modern design system for cinematic 3D visuals and motion.</p>
        <div class="hero-cta">
          <a href="#start" class="btn">Get Started</a>
        </div>
      </div>
    </main>
  </section>
  <script>
    const menuButton = document.querySelector('.mobile-menu-btn');
    const mobilePanel = document.querySelector('.mobile-panel');
    const mobileLinks = document.querySelectorAll('.mobile-panel a');

    function closeMenu() {
      menuButton.classList.remove('is-open');
      mobilePanel.classList.remove('is-open');
      document.body.classList.remove('menu-open');
      menuButton.setAttribute('aria-expanded', 'false');
      mobilePanel.setAttribute('aria-hidden', 'true');
    }

    menuButton.addEventListener('click', () => {
      const isOpen = menuButton.classList.toggle('is-open');
      mobilePanel.classList.toggle('is-open', isOpen);
      document.body.classList.toggle('menu-open', isOpen);
      menuButton.setAttribute('aria-expanded', String(isOpen));
      mobilePanel.setAttribute('aria-hidden', String(!isOpen));
    });

    mobileLinks.forEach((link) => {
      link.addEventListener('click', closeMenu);
    });

    window.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') closeMenu();
    });
  </script>
</body>
</html>
